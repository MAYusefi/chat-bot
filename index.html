<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="چت‌بات حرفه‌ای مبتنی بر هوش مصنوعی با طراحی مدرن گلاسمورفیسم">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
               script-src 'self' https://cdn.jsdelivr.net;
               style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
               font-src https://fonts.gstatic.com https://cdn.jsdelivr.net;
               img-src 'self' data:;
               connect-src 'self' https:">
  <title>چت‌بات حرفه‌ای | AI Assistant</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css">

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>
  <!-- Skip Navigation -->
  <a href="#messages" class="sr-only">رفتن به محتوای گفتگو</a>

  <!-- Background -->
  <div class="background-blur"></div>

  <!-- Mobile Sidebar Overlay -->
  <div class="sidebar-overlay"></div>

  <div class="app-shell">
    <!-- ======================== SIDEBAR ======================== -->
    <aside class="sidebar card">
      <div class="sidebar-header">
        <div class="brand-block">
          <h1 id="botTitle">دستیار هوشمند</h1>
          <p class="muted">پاسخ‌گویی هوشمند مبتنی بر هوش مصنوعی</p>
        </div>
        <button class="hamburger-btn" aria-label="بستن منوی کناری">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <button id="newChatBtn" class="btn btn-primary" style="width:100%;" aria-label="شروع گفتگوی جدید">
        <i class="fa-solid fa-plus"></i>
        گفتگوی جدید
      </button>

      <div class="conversation-list" id="conversationList"></div>

      <div class="search-box">
        <label for="searchInput">جست‌وجو در گفتگوها</label>
        <input id="searchInput" type="search" placeholder="جست‌وجو..." aria-label="جست‌وجو در گفتگوها">
        <button class="search-clear-btn" aria-label="پاک‌سازی جست‌وجو">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="sidebar-actions">
        <button id="exportTxtBtn" class="btn btn-soft" aria-label="خروجی متنی">
          <i class="fa-solid fa-file-lines"></i>
          خروجی TXT
        </button>
        <button id="exportJsonBtn" class="btn btn-soft" aria-label="خروجی جیسون">
          <i class="fa-solid fa-file-code"></i>
          خروجی JSON
        </button>
        <button id="settingsBtn" class="btn btn-soft" aria-label="باز کردن تنظیمات">
          <i class="fa-solid fa-gear"></i>
          تنظیمات
        </button>
        <button id="themeBtn" class="btn btn-soft" aria-label="تغییر تم روشن و تاریک">
          <i class="fa-solid fa-circle-half-stroke"></i>
          تغییر تم
        </button>
      </div>

      <div class="sidebar-bottom">
        <span id="connectionState">اتصال: آماده</span>
        <span id="sessionBadge">سشن: -</span>
      </div>
    </aside>

    <!-- ======================== CHAT PANEL ======================== -->
    <main class="chat-panel card">
      <header class="chat-header">
        <div>
          <button class="mobile-menu-btn" aria-label="باز کردن منوی کناری">
            <i class="fa-solid fa-bars"></i>
          </button>
          <h2>گفتگو با دستیار</h2>
          <p class="muted status-line" id="statusLine">برای شروع، پیام خود را بنویسید.</p>
        </div>
        <div class="chat-header-actions">
          <button id="clearChatBtn" class="btn-icon" aria-label="پاک‌سازی گفتگو">
            <i class="fa-solid fa-broom"></i>
          </button>
          <button id="retryBtn" class="btn-icon" disabled aria-label="تلاش دوباره">
            <i class="fa-solid fa-arrow-rotate-left"></i>
          </button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <!-- Quick Prompts Section -->
      <section id="promptSection" class="prompt-section" aria-label="پیشنهادهای سریع">
        <div class="section-title">
          <i class="fa-solid fa-bolt"></i>
          <span>پیشنهادهای سریع</span>
        </div>
        <div class="prompt-list" id="promptList" role="listbox"></div>
      </section>

      <button id="scrollToBottom" class="scroll-to-bottom" aria-label="رفتن به انتهای گفتگو">
        <i class="fa-solid fa-chevron-down"></i>
      </button>

      <form id="chatForm" class="composer">
        <textarea
          id="messageInput"
          rows="2"
          maxlength="2000"
          placeholder="پیام خود را اینجا بنویسید..."
          aria-label="نوشتن پیام"></textarea>
        <div class="composer-footer">
          <span id="charCount" class="char-count">0 / 2000</span>
          <button id="sendBtn" type="submit" class="btn btn-primary" aria-label="ارسال پیام">
            <i class="fa-regular fa-paper-plane"></i>
            ارسال
          </button>
        </div>
      </form>
    </main>
  </div>

  <!-- ======================== SETTINGS DIALOG ======================== -->
  <dialog id="settingsDialog" class="settings-dialog">
    <form id="settingsForm" method="dialog">
      <h3><i class="fa-solid fa-gear"></i> تنظیمات</h3>

      <div class="settings-group">
        <label for="webhookUrlInput">آدرس وبهوک</label>
        <input id="webhookUrlInput" type="url" placeholder="https://example.com/webhook/chatbot" aria-label="آدرس وبهوک">
      </div>

      <div class="settings-group">
        <label for="authTokenInput">توکن امنیتی</label>
        <input id="authTokenInput" type="password" placeholder="توکن را وارد کنید" aria-label="توکن امنیتی">
        <span class="settings-hint">توکن باید با مقدار وبهوک مطابقت داشته باشد</span>
      </div>

      <div class="settings-group">
        <label for="botNameInput">نام دستیار</label>
        <input id="botNameInput" type="text" placeholder="دستیار هوشمند" aria-label="نام دستیار">
      </div>

      <div class="settings-group">
        <label for="timeoutInput">مهلت پاسخ (میلی‌ثانیه)</label>
        <input
          id="timeoutInput"
          type="number"
          min="5000"
          max="120000"
          step="1000"
          placeholder="25000"
          aria-label="مهلت پاسخ">
      </div>

      <div class="settings-group">
        <label for="languageInput">زبان پاسخ</label>
        <select id="languageInput" aria-label="انتخاب زبان">
          <option value="fa-AF">دری (افغانستان)</option>
          <option value="fa-IR">فارسی (ایران)</option>
          <option value="ps-AF">پشتو</option>
          <option value="en-US">English</option>
        </select>
      </div>

      <div class="settings-divider"></div>

      <div class="settings-info">
        <p><i class="fa-solid fa-circle-info"></i> تنظیمات در مرورگر ذخیره می‌شود</p>
      </div>

      <div class="dialog-actions">
        <button type="button" class="btn btn-soft" id="cancelSettingsBtn" aria-label="انصراف">
          <i class="fa-solid fa-xmark"></i> انصراف
        </button>
        <button type="button" class="btn btn-soft" id="resetSettingsBtn" aria-label="بازنشانی">
          <i class="fa-solid fa-rotate-right"></i> بازنشانی
        </button>
        <button type="submit" class="btn btn-primary" aria-label="ذخیره تنظیمات">
          <i class="fa-solid fa-check"></i> ذخیره
        </button>
      </div>
    </form>
  </dialog>

  <!-- ======================== CONFIRM DIALOG ======================== -->
  <dialog id="confirmDialog" class="confirm-dialog">
    <h3 class="confirm-title" id="confirmTitle"></h3>
    <p class="confirm-message" id="confirmMessage"></p>
    <div class="dialog-actions">
      <button id="confirmCancel" class="btn btn-soft" aria-label="انصراف">انصراف</button>
      <button id="confirmOk" class="btn btn-danger" aria-label="تأیید">تأیید</button>
    </div>
  </dialog>

  <!-- ======================== TOAST ======================== -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ======================== SCRIPTS ======================== -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/highlight.min.js"></script>
  <script defer src="assets/js/config.js"></script>
  <script defer src="assets/js/storage.js"></script>
  <script defer src="assets/js/conversations.js"></script>
  <script defer src="assets/js/api.js"></script>
  <script defer src="assets/js/ui.js"></script>
  <script defer src="assets/js/app.js"></script>
</body>
</html>
